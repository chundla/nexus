name: Swift tests

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  modules:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            ~/.swiftpm
            Modules/.build
          key: swiftpm-${{ runner.os }}-${{ hashFiles('Modules/Package.swift', 'Modules/Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-

      - name: Test Modules (SwiftPM)
        # --no-parallel: avoids AsyncOperationSupport.blocking + parallel Swift Testing deadlocks on macOS.
        run: swift test --package-path Modules --no-parallel
        env:
          SWIFT_TEST_TIMEOUT: 300

  app:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - name: Install Swift lint tools
        run: brew install swift-format swiftlint

      - name: Swift lint
        run: ./scripts/lint-swift.sh

      - name: Cache Xcode DerivedData
        uses: actions/cache@v5
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: xcode-${{ runner.os }}-${{ hashFiles('nexus.xcodeproj/project.pbxproj', 'Modules/Package.swift', 'Modules/Package.resolved') }}
          restore-keys: |
            xcode-${{ runner.os }}-

      - name: xcodebuild test (nexus scheme)
        run: |
          set -euo pipefail
          xcodebuild test \
            -scheme nexus \
            -project nexus.xcodeproj \
            -destination 'platform=macOS' \
            -parallel-testing-enabled NO \
            -resultBundlePath "$RUNNER_TEMP/nexus-test.xcresult" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="-"
        env:
          NSUnbufferedIO: YES