# Nexus SwiftLint: strict on force_try only.
# Style decisions:
# - trailing_comma: disabled (we keep trailing commas in collection literals)
# - closure_parameter_position: kept enabled (we want parameters on the opening brace line)
# Other rules remain disabled until explicitly opted in.
disabled_rules:
  - line_length
  - function_body_length
  - type_name
  - identifier_name
  - trailing_newline
  - cyclomatic_complexity
  - large_tuple
  - function_parameter_count
  - opening_brace
  - nesting
  - vertical_whitespace
  - trailing_whitespace
  - file_length
  - type_body_length
  - todo
  - blanket_disable_command
  - trailing_comma

included:
  - Modules/Sources
  - Modules/Tests
  - nexus
  - nexusTests
  - nexusUITests

excluded:
  - Modules/.build

force_try: error

reporter: xcode